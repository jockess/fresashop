<!doctype html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>Fresa Shop</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/custom.css">
</head>

<body>

    <!-- loader -->
    <div id="loader">
        <div class="spinner-border text-primary" role="status"></div>
    </div>
    <!-- * loader -->

    <!-- App Header -->
    <div class="appHeader bg-primary text-light">
        <div class="left">
            <a href="editar-lista.html" class="headerButton goBack">
                <ion-icon name="chevron-back-outline"></ion-icon>
            </a>
        </div>
        <div class="pageTitle">Detalle Lista</div>
        <div class="right">
            <a href="listas.html" class="headerButton goBack">
                <ion-icon name="home-outline"></ion-icon>
            </a>
        </div>
    </div>
    <!-- * App Header -->

    <!-- App Capsule -->
    <div id="appCapsule">


        <div class="section  mt-2">
            <div class="section-title-fresa d-flex flex-column">
                <h2>Perla Osuna</h2>
                <h4>Lista Tanda Memorial Day</h4>
            </div>
        </div>
        <div class="section full mt-2">
            <div class="section-title-fresa">
                <div>Lista de productos</div>
                <div class="ms-auto">
                    <a class="d-flex align-items-center" href=""><i class="bi bi-plus p-color"></i> <span class="">Agregar Producto</span></a>
                </div>
            </div>

        </div>
        <div class="invoice-detail mt-1">
            <div class="table-responsive bg-white">
                <table class="table fresa">
                    <thead>
                        <tr>
                            <td>QTY</td>
                            <td>Producto</td>
                            <td>Precio</td>
                            <td>Total</td>
                            <td></td>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Taza de Mickey mouse</td>
                            <td>$320.00</td>
                            <td>$320.00</td>
                            <td><a class="edit-product p-color" href=""><i class="bi bi-pencil-square"></i></a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="section full mt-2 d-flex justify-content-center">
                <button type="button" class="btn btn-secondary btn-sm me-1 mb-1">
                    <i class="bi bi-truck"></i> Agregar Envio
                </button>
                <button type="button" class="btn btn-secondary btn-sm me-1 mb-1">
                    <i class="bi bi-cash-coin"></i> Agregar Abono
                </button>
            </div>
            <div class="invoice-total mt-2 bg-white">
                <ul class="listview transparent simple-listview">
                    <li>Subtotal <span class="hightext">$800.00</span></li>
                    <li><div><span>Envio 1</span> <span><i class="bi bi-trash3 text-danger"></i></span></div> <span class="hightext">$80.00</span></li>
                    <li><div><span>Abono 23/07/2023 </span> <span><i class="bi bi-trash3 text-danger"></i></span></div> <span class="hightext">$80.00</span></li>
                    <li>Total<span class="totaltext s-color">$800.00</span></li>
                </ul>
            </div>
        </div>
        <div class="section mt-2 d-flex FresaHome justify-content-between">
            <a href="" class="d-flex align-items-center flex-column btn btnFresa ">
                <span><i class="bi bi-trash p-color"></i></span>
                <span class="btnFresaTxt">Borrar lista</span>
            </a>
            <a href=""  class="d-flex align-items-center flex-column btn btnFresa ">
                <span><i class="bi bi-cash-stack p-color"></i></span>
                <span class="btnFresaTxt">Marcar como Pagada</span>
            </a>
            <a href=""  class="d-flex align-items-center flex-column btn btnFresa">
                <span><i class="bi bi-file-earmark-pdf p-color"></i></span>
                <span class="btnFresaTxt">Descargar PDF</span>
            </a>

        </div>

    </div>
    <!-- * App Capsule -->



    <!-- ============== Js Files ==============  -->
    <!-- Bootstrap -->
    <script src="assets/js/lib/bootstrap.min.js"></script>
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <!-- Splide -->
    <script src="assets/js/plugins/splide/splide.min.js"></script>
    <!-- ProgressBar js -->
    <script src="assets/js/plugins/progressbar-js/progressbar.min.js"></script>
    <!-- Base Js File -->
    <script src="assets/js/base.js"></script>

</body>

</html>
