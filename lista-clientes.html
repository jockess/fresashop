<!doctype html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>Fresa Shop</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/custom.css">
</head>

<body>

    <!-- loader -->
    <div id="loader">
        <div class="spinner-border text-primary" role="status"></div>
    </div>
    <!-- * loader -->

    <!-- App Header -->
    <div class="appHeader bg-primary text-light">
        <div class="left">
            <a href="listas.html" class="headerButton goBack">
                <ion-icon name="chevron-back-outline"></ion-icon>
            </a>
        </div>
        <div class="pageTitle">Lista de Clientes</div>
        <div class="right">
            <a href="listas.html" class="headerButton goBack">
                <ion-icon name="home-outline"></ion-icon>
            </a>
        </div>
    </div>
    <!-- * App Header -->

    <!-- App Capsule -->
    <div id="appCapsule">


        <div class="section  mt-2">
            <div class="profile-head">
                <div class="section-title-fresa d-flex align-items-center w-100 FresaHome">
                    <h2 class="m-0">Clientes</h2>
                    <div class="d-flex align-items-center ms-auto">
                        <a class="d-flex align-items-center btn btnFresa" data-bs-toggle="modal" data-bs-target="#ModalAddClient" href=""><i class="bi bi-person-plus-fill p-color"></i> <span class="ps-1">Agregar Cliente</span></a>
                    </div>
                </div>
            </div>

        </div>
        <ul class="listview link-listview mt-1">
                <li>
                    <a href="detalle-cliente.html">
                        <span>Perla Osuna</span>
                        <span class="text-muted">Ver</span>
                    </a>
                </li>
                <li>
                    <a href="detalle-cliente.html">
                        <span>Adri Salcedo</span>
                        <span class="text-muted">Ver</span>
                    </a>
                </li>
        </ul>

<!-- Modal Form -->
<div class="modal fade modalbox" id="ModalAddClient" data-bs-backdrop="static" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Agregar Cliente</h5>
                <a href="#" data-bs-dismiss="modal">Cancelar</a>
            </div>
            <div class="modal-body">
                <div class="login-form">
                    <div class="section mt-2">
                        <h1>Cliente nuevo</h1>
                    </div>
                    <div class="section mt-4 mb-5">
                        <form>
                            <div class="form-group boxed">
                                <div class="input-wrapper">
                                    <label class="form-label" for="nameList">Nombre</label>
                                    <input type="text" class="form-control" id="nameClient" 
                                        autocomplete="off">
                                    <i class="clear-input">
                                        <ion-icon name="close-circle"></ion-icon>
                                    </i>
                                </div>
                            </div>
                            <div class="form-group boxed">
                                <div class="input-wrapper">
                                    <label class="form-label" for="givenames">Apellidos</label>
                                    <input type="text" class="form-control" id="givenames" 
                                        autocomplete="off">
                                    <i class="clear-input">
                                        <ion-icon name="close-circle"></ion-icon>
                                    </i>
                                </div>
                            </div>
                            <div class="form-group boxed">
                                <div class="input-wrapper">
                                    <label class="form-label" for="email">Email</label>
                                    <input type="email" class="form-control" id="email"
                                        autocomplete="off">
                                    <i class="clear-input">
                                        <ion-icon name="close-circle"></ion-icon>
                                    </i>
                                </div>
                            </div>
                            <div class="form-group boxed">
                                <div class="input-wrapper">
                                    <label class="form-label" for="phone">Teléfono</label>
                                    <input type="number" class="form-control" id="phone"
                                        autocomplete="off">
                                    <i class="clear-input">
                                        <ion-icon name="close-circle"></ion-icon>
                                    </i>
                                </div>
                            </div>
                            <div class="form-group boxed">
                                <div class="input-wrapper">
                                    <label class="form-label" for="street">Calle y numero</label>
                                    <input type="number" class="form-control" id="street"
                                        autocomplete="off">
                                    <i class="clear-input">
                                        <ion-icon name="close-circle"></ion-icon>
                                    </i>
                                </div>
                            </div>
                            <div class="form-group boxed">
                                <div class="input-wrapper">
                                    <label class="form-label" for="colonia">Colonia, Municipio</label>
                                    <input type="number" class="form-control" id="colonia"
                                        autocomplete="off">
                                    <i class="clear-input">
                                        <ion-icon name="close-circle"></ion-icon>
                                    </i>
                                </div>
                            </div>
                            <div class="form-group boxed">
                                <div class="input-wrapper">
                                    <label class="form-label" for="state">Estado</label>
                                    <input type="number" class="form-control" id="state"
                                        autocomplete="off">
                                    <i class="clear-input">
                                        <ion-icon name="close-circle"></ion-icon>
                                    </i>
                                </div>
                            </div>
                            <div class="form-group boxed">
                                <div class="input-wrapper">
                                    <label class="form-label" for="cp">Codigo postal</label>
                                    <input type="number" class="form-control" id="cp"
                                        autocomplete="off">
                                    <i class="clear-input">
                                        <ion-icon name="close-circle"></ion-icon>
                                    </i>
                                </div>
                            </div>

                            <div class="mt-2">
                                <button type="button" class="btn btn-primary btn-block btn-lg"
                                    data-bs-dismiss="modal">Guardar cliente</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- * Modal Form -->
    </div>
    <!-- * App Capsule -->



    <!-- ============== Js Files ==============  -->
    <!-- Bootstrap -->
    <script src="assets/js/lib/bootstrap.min.js"></script>
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <!-- Splide -->
    <script src="assets/js/plugins/splide/splide.min.js"></script>
    <!-- ProgressBar js -->
    <script src="assets/js/plugins/progressbar-js/progressbar.min.js"></script>
    <!-- Base Js File -->
    <script src="assets/js/base.js"></script>

</body>

</html>
